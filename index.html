<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ZapHive — Play free browser games. Action, Puzzle, IO Games, Arcade, Driving, Multiplayer and more.">
  <title>ZapHive — Free Browser Games</title>
  <link rel="stylesheet" href="style.css">
  <!-- Favicon emoji fallback -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <!-- ── TOP NAVIGATION ── -->
  <nav id="top-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-logo" aria-label="ZapHive Home">
      <span class="lightning" aria-hidden="true">⚡</span>
      <span class="zap">Zap</span><span class="hive">Hive</span>
    </div>

    <div class="nav-search" role="search">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input
        type="search"
        id="search-input"
        placeholder="Search games…"
        autocomplete="off"
        aria-label="Search games"
        spellcheck="false">
    </div>

    <div class="nav-stats" aria-label="Site statistics">
      <div class="nav-stat">
        🎮 <span class="val" id="nav-published">0</span> games
      </div>
      <div class="nav-stat">
        ▶ <span class="val" id="nav-total-plays">0</span> plays
      </div>
    </div>
  </nav>

  <!-- ── CATEGORY FILTER BAR ── -->
  <div id="cat-bar" role="navigation" aria-label="Category filter">
    <ul id="cat-list" aria-label="Game categories"></ul>
  </div>

  <!-- ── HERO BANNER ── -->
  <header id="hero" role="banner">
    <h1>
      Play <span class="accent-y">Free</span> Browser Games<br>
      <span class="accent-b">No Download. Just Play.</span>
    </h1>
    <p>Action · Puzzle · IO Games · Arcade · Driving · Multiplayer &amp; more</p>
  </header>

  <!-- ── MAIN GAME SECTIONS ── -->
  <main id="main-content" role="main" aria-label="Game library">
    <!-- Populated by main.js -->
    <div class="empty-state">
      <div class="icon">⚡</div>
      <p>Loading games…</p>
    </div>
  </main>

  <!-- ── FOOTER ── -->
  <footer role="contentinfo">
    <p>
      <span class="logo-text">⚡ZapHive</span> &mdash;
      Free browser games, no download needed. &nbsp;|&nbsp;
      <a href="developer.html">Dev Panel</a>
    </p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
