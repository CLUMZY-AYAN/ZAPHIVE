<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ZapHive — Play free browser games.">
  <title>ZapHive — Free Browser Games</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <nav id="top-nav">
    <div class="nav-logo">
      <span class="lightning">⚡</span>
      <span class="zap">Zap</span><span class="hive">Hive</span>
    </div>

    <div class="nav-search">
      <span class="search-icon">🔍</span>
      <input type="search" id="search-input" placeholder="Search games…" autocomplete="off" spellcheck="false">
    </div>

    <div style="display:flex;align-items:center;gap:0.4rem;flex-shrink:0">

      <!-- Currency display (logged in users only) -->
      <div id="nav-currency" style="display:flex;align-items:center;gap:0.5rem;margin-right:0.3rem">
        <span style="font-size:0.72rem;color:var(--accent-yellow);font-family:var(--font-display);white-space:nowrap">⚡<span id="nav-zap">0</span></span>
        <span style="font-size:0.72rem;color:#00cfff;font-family:var(--font-display);white-space:nowrap">💳<span id="nav-credits">0</span></span>
      </div>

      <!-- Leaderboard -->
      <button id="nav-lb-btn" title="Leaderboard"
        style="background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--text-muted);font-size:0.75rem;padding:0.3rem 0.65rem;cursor:pointer;transition:all 0.18s"
        onmouseenter="this.style.borderColor='var(--accent-yellow)';this.style.color='var(--accent-yellow)'"
        onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'"
        onclick="openLeaderboard()">🏆</button>

      <!-- Friends (goes to friends.html on mobile, opens panel on desktop) -->
      <button id="nav-friends-btn" title="Friends"
        style="background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--text-muted);font-size:0.75rem;padding:0.3rem 0.65rem;cursor:pointer;transition:all 0.18s"
        onmouseenter="this.style.borderColor='var(--accent-cyan)';this.style.color='var(--accent-cyan)'"
        onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'"
        onclick="handleFriendsClick()">👥</button>

      <!-- User avatar -->
      <div id="nav-user-wrap" style="display:flex;align-items:center"></div>
    </div>
  </nav>

  <div id="cat-bar"><ul id="cat-list"></ul></div>

  <header id="hero">
    <h1>Play <span class="accent-y">Free</span> Browser Games<br><span class="accent-b">No Download. Just Play.</span></h1>
    <p>Action · Puzzle · IO Games · Arcade · Driving · Multiplayer &amp; more</p>
  </header>

  <main id="main-content">
    <div class="empty-state"><div class="icon">⚡</div><p>Loading games…</p></div>
  </main>

  <footer>
    <p><span class="logo-text">⚡ZapHive</span> — Free browser games, no download needed. &nbsp;|&nbsp; <a href="developer.html">Dev Panel</a></p>
  </footer>

  <!-- Leaderboard modal -->
  <div id="zh-leaderboard-modal" class="zh-hidden" style="position:fixed;inset:0;background:rgba(5,13,26,0.88);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem">
    <div style="background:var(--bg-card);border:1px solid var(--accent-blue);border-radius:12px;padding:1.5rem;max-width:360px;width:100%;max-height:85vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem">
        <span style="font-family:var(--font-display);font-size:0.9rem;color:var(--accent-yellow)">🏆 LEADERBOARD</span>
        <button onclick="document.getElementById('zh-leaderboard-modal').classList.add('zh-hidden')" style="background:transparent;border:none;color:var(--text-muted);font-size:1.1rem;cursor:pointer">✕</button>
      </div>
      <div id="lb-content"><div style="text-align:center;color:var(--text-muted);padding:1.5rem">Loading…</div></div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="friends.js"></script>
  <script src="main.js"></script>
  <script>
    // Friends button — open page on mobile, panel on desktop
    function handleFriendsClick(){
      if(window.innerWidth<=768){
        window.location.href='friends.html';
      } else {
        if(window.ZapHiveFriends) window.ZapHiveFriends.openFriends();
        else window.location.href='friends.html';
      }
    }

    // Leaderboard
    async function openLeaderboard(){
      const modal=document.getElementById('zh-leaderboard-modal');
      modal.classList.remove('zh-hidden');
      const DB_URL='https://zaphive-736c0-default-rtdb.firebaseio.com';
      const lbContent=document.getElementById('lb-content');
      lbContent.innerHTML='<div style="text-align:center;color:var(--text-muted);padding:1.5rem">Loading…</div>';
      modal.addEventListener('click',e=>{ if(e.target===modal) modal.classList.add('zh-hidden'); },{once:true});
      try{
        const res=await fetch(DB_URL+'/users.json');
        const users=await res.json();
        if(!users){lbContent.innerHTML='<div style="text-align:center;color:var(--text-muted)">No players yet.</div>';return;}
        const sorted=Object.values(users).filter(u=>!u.isGuest).sort((a,b)=>(b.zap||0)-(a.zap||0)).slice(0,10);
        const auth=window.ZapHiveAuth;
        const currentUser=auth?auth.getCurrentUser():null;
        const medals=['🥇','🥈','🥉'];
        lbContent.innerHTML='';
        if(!sorted.length){lbContent.innerHTML='<div style="text-align:center;color:var(--text-muted)">No players yet.</div>';return;}
        sorted.forEach((u,i)=>{
          const isMe=currentUser&&u.uid===currentUser.uid;
          const role=u.role||'user';
          const roleMeta=auth?auth.ROLE_META[role]:null;
          const ringColor=(roleMeta&&roleMeta.color)||'var(--accent-blue)';
          const avatarInner=u.avatarType==='image'?`<img src="${u.avatar}" style="width:36px;height:36px;object-fit:cover;border-radius:50%">`:`<span style="font-size:1.3rem">${u.avatar||'👾'}</span>`;
          const div=document.createElement('div');
          div.style.cssText=`display:flex;align-items:center;gap:0.7rem;padding:0.65rem;border-radius:8px;margin-bottom:0.4rem;background:${isMe?'rgba(26,140,255,0.1)':'var(--bg-section)'};border:1px solid ${isMe?'var(--accent-blue)':'var(--border)'}`;
          div.innerHTML=`
            <div style="width:24px;text-align:center;font-size:${i<3?'1.1rem':'0.82rem'};font-weight:700;flex-shrink:0">${i<3?medals[i]:i+1}</div>
            <div style="width:36px;height:36px;border-radius:50%;border:2.5px solid ${ringColor};display:flex;align-items:center;justify-content:center;background:var(--bg-section);overflow:hidden;flex-shrink:0">${avatarInner}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:0.82rem;font-weight:700;color:${isMe?'var(--accent-cyan)':'var(--text-white)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.username||'?'}${isMe?' (You)':''}</div>
              <div style="font-size:0.68rem;color:var(--text-muted)">Level ${u.level||1}${roleMeta&&roleMeta.label?` · ${roleMeta.label}`:''}</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-family:var(--font-display);font-size:0.82rem;color:var(--accent-yellow)">⚡${u.zap||0}</div>
              <div style="font-size:0.65rem;color:var(--text-muted)">ZAP</div>
            </div>`;
          lbContent.appendChild(div);
        });
      }catch(e){lbContent.innerHTML='<div style="text-align:center;color:var(--text-muted)">Could not load.</div>';}
    }
  </script>
</body>
</html>
