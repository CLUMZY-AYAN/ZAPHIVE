<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ZapHive — Play free browser games.">
  <title>ZapHive — Free Browser Games</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <nav id="top-nav">
    <div class="nav-logo">
      <span class="lightning">⚡</span>
      <span class="zap">Zap</span><span class="hive">Hive</span>
    </div>
    <div class="nav-search">
      <span class="search-icon">🔍</span>
      <input type="search" id="search-input" placeholder="Search games…" autocomplete="off" spellcheck="false">
    </div>
    <!-- Nav right area -->
    <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0">
      <!-- Leaderboard button -->
      <button id="nav-lb-btn" title="Leaderboard"
        style="background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--text-muted);font-size:0.75rem;padding:0.3rem 0.7rem;cursor:pointer;display:flex;align-items:center;gap:0.3rem;transition:all 0.18s;white-space:nowrap"
        onmouseenter="this.style.borderColor='var(--accent-yellow)';this.style.color='var(--accent-yellow)'"
        onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'"
        onclick="if(window.ZapHiveFriends)window.ZapHiveFriends.openLeaderboard()">
        🏆
      </button>
      <!-- Friends button -->
      <button id="nav-friends-btn" title="Friends"
        style="background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--text-muted);font-size:0.75rem;padding:0.3rem 0.7rem;cursor:pointer;display:flex;align-items:center;gap:0.3rem;transition:all 0.18s;white-space:nowrap"
        onmouseenter="this.style.borderColor='var(--accent-cyan)';this.style.color='var(--accent-cyan)'"
        onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'"
        onclick="if(window.ZapHiveFriends)window.ZapHiveFriends.openFriends()">
        👥
      </button>
      <!-- User area (populated by auth.js) -->
      <div id="nav-user-wrap" style="display:flex;align-items:center"></div>
    </div>
  </nav>

  <div id="cat-bar">
    <ul id="cat-list"></ul>
  </div>

  <header id="hero">
    <h1>Play <span class="accent-y">Free</span> Browser Games<br><span class="accent-b">No Download. Just Play.</span></h1>
    <p>Action · Puzzle · IO Games · Arcade · Driving · Multiplayer &amp; more</p>
  </header>

  <main id="main-content">
    <div class="empty-state"><div class="icon">⚡</div><p>Loading games…</p></div>
  </main>

  <footer>
    <p><span class="logo-text">⚡ZapHive</span> — Free browser games, no download needed. &nbsp;|&nbsp; <a href="developer.html">Dev Panel</a></p>
  </footer>

  <script src="auth.js"></script>
  <script src="friends.js"></script>
  <script src="main.js"></script>
</body>
</html>
