<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZapHive — Developer Panel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <meta name="robots" content="noindex, nofollow">
  <style>
    .zh-hidden { display: none !important; }
    #dev-dashboard { display: block; min-height: 100vh; }
    #access-gate { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 1rem; }
    #dev-dashboard-inner { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  </style>
</head>
<body id="dev-body">

  <!-- ACCESS GATE -->
  <div id="access-gate">
    <div class="gate-box">
      <div class="gate-logo">
        <span class="zap">⚡Zap</span><span class="hive">Hive</span>
      </div>
      <p class="gate-sub">Developer Panel — Authorized Access Only</p>

      <!-- action="javascript:void(0)" prevents page refresh on submit -->
      <form id="code-form" action="javascript:void(0)" novalidate>
        <input
          type="password"
          id="code-input"
          class="gate-input"
          placeholder="Enter access code"
          autocomplete="off"
          maxlength="20">
        <button type="submit" class="gate-btn">Enter Dashboard</button>
        <div id="gate-error" class="gate-error"></div>
      </form>

      <p style="margin-top:1.5rem;font-size:0.75rem;color:var(--text-muted)">
        <a href="index.html" style="color:var(--accent-blue)">← Back to ZapHive</a>
      </p>
    </div>
  </div>

  <!-- DEVELOPER DASHBOARD -->
  <div id="dev-dashboard" class="zh-hidden">

    <nav style="background:var(--bg-nav);border-bottom:1px solid var(--border);padding:0 1.2rem;height:52px;display:flex;align-items:center;gap:1rem">
      <div class="nav-logo">
        <span class="lightning">⚡</span>
        <span class="zap">Zap</span><span class="hive">Hive</span>
      </div>
      <span style="font-size:0.78rem;color:var(--text-muted);font-family:var(--font-display);letter-spacing:1px">DEV PANEL</span>
      <div style="flex:1"></div>
      <a href="index.html" style="color:var(--text-muted);font-size:0.78rem;margin-right:0.5rem">← Site</a>
      <button id="logout-btn" class="logout-btn">Logout</button>
    </nav>

    <div id="dev-dashboard-inner">

      <div class="dev-header">
        <h1>🛠 Developer Dashboard</h1>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="s-val" id="stat-total">0</div>
          <div class="s-label">Total Games</div>
        </div>
        <div class="stat-card">
          <div class="s-val" id="stat-published">0</div>
          <div class="s-label">Published</div>
        </div>
        <div class="stat-card">
          <div class="s-val" id="stat-dev">0</div>
          <div class="s-label">In Development</div>
        </div>
        <div class="stat-card">
          <div class="s-val" id="stat-plays">0</div>
          <div class="s-label">Total Plays</div>
        </div>
      </div>

      <div class="dev-panels">

        <!-- Upload Panel -->
        <div class="panel">
          <h2>⬆ Upload New Game</h2>
          <form id="upload-form" action="javascript:void(0)" novalidate>
            <div class="field">
              <label for="upload-title">Game Title *</label>
              <input type="text" id="upload-title" placeholder="e.g. Space Shooter" maxlength="80">
            </div>
            <div class="field">
              <label for="upload-logo">Logo / Thumbnail URL</label>
              <input type="text" id="upload-logo" placeholder="https://example.com/logo.png">
            </div>
            <div class="field">
              <label for="upload-desc">Description</label>
              <textarea id="upload-desc" rows="3" placeholder="Short description…" maxlength="400"></textarea>
            </div>
            <div class="field">
              <label for="upload-embed">Embed URL or iframe Code *</label>
              <textarea id="upload-embed" rows="2" placeholder="https://game-url.com/" maxlength="2000"></textarea>
            </div>
            <div class="field">
              <label for="upload-category">Category *</label>
              <select id="upload-category">
                <option value="">Select category…</option>
                <option>Action</option>
                <option>Driving</option>
                <option>Multiplayer</option>
                <option>Puzzle</option>
                <option>Arcade</option>
                <option>IO Games</option>
                <option>New Games</option>
              </select>
            </div>
            <div class="field">
              <label for="upload-status">Status</label>
              <select id="upload-status">
                <option value="Published">Published</option>
                <option value="In Development">In Development</option>
              </select>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-primary">⬆ Upload Game</button>
              <button type="button" id="preview-btn" class="btn-secondary">👁 Preview</button>
            </div>
          </form>
        </div>

        <!-- Management Panel -->
        <div class="panel">
          <h2>📋 Manage Games</h2>
          <div id="mgmt-list" class="game-mgmt-list"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div id="edit-modal" class="zh-hidden" style="position:fixed;inset:0;background:rgba(5,13,26,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem">
    <div class="modal-box">
      <h3>✏️ Edit Game</h3>
      <form id="edit-form" action="javascript:void(0)" novalidate>
        <div class="field">
          <label for="edit-title">Game Title *</label>
          <input type="text" id="edit-title" maxlength="80">
        </div>
        <div class="field">
          <label for="edit-logo">Logo URL</label>
          <input type="text" id="edit-logo">
        </div>
        <div class="field">
          <label for="edit-desc">Description</label>
          <textarea id="edit-desc" rows="3" maxlength="400"></textarea>
        </div>
        <div class="field">
          <label for="edit-embed">Embed URL / iframe Code</label>
          <textarea id="edit-embed" rows="2" maxlength="2000"></textarea>
        </div>
        <div class="field">
          <label for="edit-category">Category *</label>
          <select id="edit-category">
            <option value="">Select category…</option>
            <option>Action</option>
            <option>Driving</option>
            <option>Multiplayer</option>
            <option>Puzzle</option>
            <option>Arcade</option>
            <option>IO Games</option>
            <option>New Games</option>
          </select>
        </div>
        <div class="field">
          <label for="edit-status">Status</label>
          <select id="edit-status">
            <option value="Published">Published</option>
            <option value="In Development">In Development</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">💾 Save Changes</button>
          <button type="button" id="edit-close" class="btn-secondary">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- TOAST -->
  <div id="dev-toast" class="zh-hidden" style="position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg-card);border:1px solid var(--accent-blue);border-radius:10px;padding:0.8rem 1.2rem;color:var(--text-white);font-size:0.85rem;z-index:1000;max-width:280px"></div>

  <script src="dev.js"></script>
</body>
</html>
